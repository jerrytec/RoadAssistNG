name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck & icon regression tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      # Dedicated step so a failure surfaces clearly as "Icon regression"
      # in the PR checks UI and blocks merges via branch protection.
      - name: Icon regression tests (provider map + no-emoji guard)
        run: bunx vitest run src/test/providerIcons.test.ts src/test/no-emoji.test.ts

      - name: Full test suite
        run: bun run test
